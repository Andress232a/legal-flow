version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api_gateway:
    build:
      context: ./services/api_gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./api.key:/app/api.key:ro
      - ./api.crt:/app/api.crt:ro
    env_file:
      - .env
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-insecure-secret-key-change-me}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://legal-flow-delta.vercel.app,http://localhost:5173}
      - IAM_SERVICE_URL=http://iam_service:8001/api
      - DOCUMENT_SERVICE_URL=http://document_service:8002/api
      - MATTER_SERVICE_URL=http://matter_service:8003/api
      - TIME_SERVICE_URL=http://time_tracking_service:8004/api
      - BILLING_SERVICE_URL=http://billing_service:8005/api
      - CALENDAR_SERVICE_URL=http://calendar_service:8006/api
      - ANALYTICS_SERVICE_URL=http://analytics_service:8007/api
      - PORTAL_SERVICE_URL=http://client_portal_service:8008/api
    depends_on:
      - iam_service

  iam_service:
    build:
      context: ./services/iam_service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - IAM_DB_NAME=${IAM_DB_NAME:-legalflow_iam}
      - IAM_DB_USER=root
      - IAM_DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_secret}
      - IAM_DB_HOST=mysql
      - IAM_DB_PORT=3306
    depends_on:
      mysql:
        condition: service_healthy

  document_service:
    build:
      context: ./services/document_service
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - DOC_DB_NAME=${DOC_DB_NAME:-legalflow_documents}
      - DOC_DB_USER=root
      - DOC_DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_secret}
      - DOC_DB_HOST=mysql
      - DOC_DB_PORT=3306
    depends_on:
      mysql:
        condition: service_healthy

  matter_service:
    build:
      context: ./services/matter_service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - MATTER_DB_NAME=${MATTER_DB_NAME:-legalflow_matters}
      - MATTER_DB_USER=root
      - MATTER_DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_secret}
      - MATTER_DB_HOST=mysql
      - MATTER_DB_PORT=3306
    depends_on:
      mysql:
        condition: service_healthy

  time_tracking_service:
    build:
      context: ./services/time_tracking_service
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    env_file:
      - .env
    environment:
      - TIMETRACKING_DB_NAME=${TIMETRACKING_DB_NAME:-legalflow_timetracking}
      - TIMETRACKING_DB_USER=root
      - TIMETRACKING_DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_secret}
      - TIMETRACKING_DB_HOST=mysql
      - TIMETRACKING_DB_PORT=3306
    depends_on:
      mysql:
        condition: service_healthy

  billing_service:
    build:
      context: ./services/billing_service
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    env_file:
      - .env
    environment:
      - BILLING_DB_NAME=${BILLING_DB_NAME:-legalflow_billing}
      - BILLING_DB_USER=root
      - BILLING_DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_secret}
      - BILLING_DB_HOST=mysql
      - BILLING_DB_PORT=3306
    depends_on:
      mysql:
        condition: service_healthy

  calendar_service:
    build:
      context: ./services/calendar_service
      dockerfile: Dockerfile
    ports:
      - "8006:8006"
    env_file:
      - .env
    environment:
      - CALENDAR_DB_NAME=${CALENDAR_DB_NAME:-legalflow_calendar}
      - CALENDAR_DB_USER=root
      - CALENDAR_DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_secret}
      - CALENDAR_DB_HOST=mysql
      - CALENDAR_DB_PORT=3306
    depends_on:
      mysql:
        condition: service_healthy

  analytics_service:
    build:
      context: ./services/analytics_service
      dockerfile: Dockerfile
    ports:
      - "8007:8007"
    env_file:
      - .env
    environment:
      - ANALYTICS_DB_NAME=${ANALYTICS_DB_NAME:-legalflow_analytics}
      - ANALYTICS_DB_USER=root
      - ANALYTICS_DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_secret}
      - ANALYTICS_DB_HOST=mysql
      - ANALYTICS_DB_PORT=3306
    depends_on:
      mysql:
        condition: service_healthy

  client_portal_service:
    build:
      context: ./services/client_portal_service
      dockerfile: Dockerfile
    ports:
      - "8008:8008"
    env_file:
      - .env
    environment:
      - PORTAL_DB_NAME=${PORTAL_DB_NAME:-legalflow_portal}
      - PORTAL_DB_USER=root
      - PORTAL_DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_secret}
      - PORTAL_DB_HOST=mysql
      - PORTAL_DB_PORT=3306
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
