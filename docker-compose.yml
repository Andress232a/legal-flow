services:
  # ========================
  # Infrastructure
  # ========================
  mysql_iam:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${IAM_DB_NAME:-legalflow_iam}
      MYSQL_USER: ${IAM_DB_USER:-legalflow}
      MYSQL_PASSWORD: ${IAM_DB_PASSWORD:-legalflow_secret}
      MYSQL_ROOT_PASSWORD: ${IAM_DB_ROOT_PASSWORD:-root_secret}
    volumes:
      - mysql_iam_data:/var/lib/mysql
    ports:
      - "3307:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  mysql_documents:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DOC_DB_NAME:-legalflow_documents}
      MYSQL_USER: ${DOC_DB_USER:-legalflow}
      MYSQL_PASSWORD: ${DOC_DB_PASSWORD:-legalflow_secret}
      MYSQL_ROOT_PASSWORD: ${DOC_DB_ROOT_PASSWORD:-root_secret}
    volumes:
      - mysql_doc_data:/var/lib/mysql
    ports:
      - "3308:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ========================
  # API Gateway (entrada única)
  # ========================
  api_gateway:
    build:
      context: ./services/api_gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-insecure-secret-key-change-me}
      - IAM_SERVICE_URL=http://iam_service:8001/api
      - DOCUMENT_SERVICE_URL=http://document_service:8002/api
      - MATTER_SERVICE_URL=http://matter_service:8003/api
      - TIME_SERVICE_URL=http://time_tracking_service:8004/api
      - BILLING_SERVICE_URL=http://billing_service:8005/api
      - CALENDAR_SERVICE_URL=http://calendar_service:8006/api
      - ANALYTICS_SERVICE_URL=http://analytics_service:8007/api
      - PORTAL_SERVICE_URL=http://client_portal_service:8008/api
    depends_on:
      iam_service:
        condition: service_started
      document_service:
        condition: service_started
      matter_service:
        condition: service_started
      time_tracking_service:
        condition: service_started
      billing_service:
        condition: service_started
      calendar_service:
        condition: service_started
      analytics_service:
        condition: service_started
      client_portal_service:
        condition: service_started

  # ========================
  # IAM Service
  # ========================
  iam_service:
    build:
      context: ./services/iam_service
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py makemigrations iam &&
             python manage.py migrate &&
             python manage.py seed_permissions &&
             python manage.py seed_admin &&
             python manage.py runserver 0.0.0.0:8001"
    volumes:
      - ./services/iam_service:/app
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DATABASE_NAME=${IAM_DB_NAME:-legalflow_iam}
      - DATABASE_USER=${IAM_DB_USER:-legalflow}
      - DATABASE_PASSWORD=${IAM_DB_PASSWORD:-legalflow_secret}
      - DATABASE_HOST=mysql_iam
      - DATABASE_PORT=3306
      - CELERY_BROKER_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=*
      - SECRET_KEY=${SECRET_KEY:-dev-insecure-secret-key-change-me}
    depends_on:
      mysql_iam:
        condition: service_healthy
      redis:
        condition: service_healthy

  iam_celery_worker:
    build:
      context: ./services/iam_service
      dockerfile: Dockerfile
    command: celery -A config worker -l info
    volumes:
      - ./services/iam_service:/app
    env_file:
      - .env
    environment:
      - DATABASE_NAME=${IAM_DB_NAME:-legalflow_iam}
      - DATABASE_USER=${IAM_DB_USER:-legalflow}
      - DATABASE_PASSWORD=${IAM_DB_PASSWORD:-legalflow_secret}
      - DATABASE_HOST=mysql_iam
      - DATABASE_PORT=3306
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      mysql_iam:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ========================
  # Document Service
  # ========================
  document_service:
    build:
      context: ./services/document_service
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py makemigrations documents &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8002"
    volumes:
      - ./services/document_service:/app
      - document_storage:/app/media/documents
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - DATABASE_NAME=${DOC_DB_NAME:-legalflow_documents}
      - DATABASE_USER=${DOC_DB_USER:-legalflow}
      - DATABASE_PASSWORD=${DOC_DB_PASSWORD:-legalflow_secret}
      - DATABASE_HOST=mysql_documents
      - DATABASE_PORT=3306
      - CELERY_BROKER_URL=redis://redis:6379/0
      - IAM_SERVICE_URL=http://iam_service:8001
      - SECRET_KEY=${SECRET_KEY:-dev-insecure-secret-key-change-me}
    depends_on:
      mysql_documents:
        condition: service_healthy
      redis:
        condition: service_healthy
      iam_service:
        condition: service_started

  document_celery_worker:
    build:
      context: ./services/document_service
      dockerfile: Dockerfile
    command: celery -A config worker -l info
    volumes:
      - ./services/document_service:/app
      - document_storage:/app/media/documents
    env_file:
      - .env
    environment:
      - DATABASE_NAME=${DOC_DB_NAME:-legalflow_documents}
      - DATABASE_USER=${DOC_DB_USER:-legalflow}
      - DATABASE_PASSWORD=${DOC_DB_PASSWORD:-legalflow_secret}
      - DATABASE_HOST=mysql_documents
      - DATABASE_PORT=3306
      - CELERY_BROKER_URL=redis://redis:6379/0
      - IAM_SERVICE_URL=http://iam_service:8001
    depends_on:
      mysql_documents:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ========================
  # Frontend (Vite) — node_modules en volumen Linux: evita bloqueo de esbuild.exe en Windows
  # ========================
  frontend:
    image: node:22-bookworm-slim
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      LEGALFLOW_API_HOST: api_gateway
      LEGALFLOW_GATEWAY_PORT: "8080"
    command: >
      sh -c "(npm ci || npm install) && npm run dev -- --host 0.0.0.0"
    depends_on:
      api_gateway:
        condition: service_started

  # ========================
  # Client Portal (frontend)
  # ========================
  client_portal_frontend:
    image: node:22-bookworm-slim
    working_dir: /app
    ports:
      - "3001:3001"
    volumes:
      - ./client-portal:/app
      - client_portal_node_modules:/app/node_modules
    environment:
      LEGALFLOW_API_HOST: api_gateway
      LEGALFLOW_GATEWAY_PORT: "8080"
    command: >
      sh -c "(npm ci || npm install) && npm run dev -- --host 0.0.0.0"
    depends_on:
      api_gateway:
        condition: service_started

  mysql_matters:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MATTER_DB_NAME:-legalflow_matters}
      MYSQL_USER: ${MATTER_DB_USER:-legalflow}
      MYSQL_PASSWORD: ${MATTER_DB_PASSWORD:-legalflow_secret}
      MYSQL_ROOT_PASSWORD: ${MATTER_DB_ROOT_PASSWORD:-root_secret}
    volumes:
      - mysql_matter_data:/var/lib/mysql
    ports:
      - "3309:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ========================
  # Matter Service
  # ========================
  matter_service:
    build:
      context: ./services/matter_service
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py makemigrations matters &&
             python manage.py migrate &&
             python manage.py seed_cases &&
             python manage.py runserver 0.0.0.0:8003"
    volumes:
      - ./services/matter_service:/app
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - DATABASE_NAME=${MATTER_DB_NAME:-legalflow_matters}
      - DATABASE_USER=${MATTER_DB_USER:-legalflow}
      - DATABASE_PASSWORD=${MATTER_DB_PASSWORD:-legalflow_secret}
      - DATABASE_HOST=mysql_matters
      - DATABASE_PORT=3306
      - CELERY_BROKER_URL=redis://redis:6379/0
      - IAM_SERVICE_URL=http://iam_service:8001
      - CALENDAR_SERVICE_URL=http://calendar_service:8006
      - BILLING_SERVICE_URL=http://billing_service:8005
      - ALLOWED_HOSTS=*
      - SECRET_KEY=${SECRET_KEY:-dev-insecure-secret-key-change-me}
    depends_on:
      mysql_matters:
        condition: service_healthy
      redis:
        condition: service_healthy
      iam_service:
        condition: service_started

  matter_celery_worker:
    build:
      context: ./services/matter_service
      dockerfile: Dockerfile
    command: celery -A config worker -l info
    volumes:
      - ./services/matter_service:/app
    env_file:
      - .env
    environment:
      - DATABASE_NAME=${MATTER_DB_NAME:-legalflow_matters}
      - DATABASE_USER=${MATTER_DB_USER:-legalflow}
      - DATABASE_PASSWORD=${MATTER_DB_PASSWORD:-legalflow_secret}
      - DATABASE_HOST=mysql_matters
      - DATABASE_PORT=3306
      - CELERY_BROKER_URL=redis://redis:6379/0
      - IAM_SERVICE_URL=http://iam_service:8001
      - CALENDAR_SERVICE_URL=http://calendar_service:8006
      - BILLING_SERVICE_URL=http://billing_service:8005
    depends_on:
      mysql_matters:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql_timetracking:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${TIMETRACKING_DB_NAME:-legalflow_timetracking}
      MYSQL_USER: ${TIMETRACKING_DB_USER:-legalflow}
      MYSQL_PASSWORD: ${TIMETRACKING_DB_PASSWORD:-legalflow_secret}
      MYSQL_ROOT_PASSWORD: ${TIMETRACKING_DB_ROOT_PASSWORD:-root_secret}
    volumes:
      - mysql_timetracking_data:/var/lib/mysql
    ports:
      - "3310:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ========================
  # Time Tracking Service
  # ========================
  time_tracking_service:
    build:
      context: ./services/time_tracking_service
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py makemigrations time_tracking &&
             python manage.py migrate &&
             python manage.py seed_time_entries &&
             python manage.py runserver 0.0.0.0:8004"
    volumes:
      - ./services/time_tracking_service:/app
    ports:
      - "8004:8004"
    env_file:
      - .env
    environment:
      - DATABASE_NAME=${TIMETRACKING_DB_NAME:-legalflow_timetracking}
      - DATABASE_USER=${TIMETRACKING_DB_USER:-legalflow}
      - DATABASE_PASSWORD=${TIMETRACKING_DB_PASSWORD:-legalflow_secret}
      - DATABASE_HOST=mysql_timetracking
      - DATABASE_PORT=3306
      - CELERY_BROKER_URL=redis://redis:6379/0
      - IAM_SERVICE_URL=http://iam_service:8001
      - ALLOWED_HOSTS=*
      - SECRET_KEY=${SECRET_KEY:-dev-insecure-secret-key-change-me}
    depends_on:
      mysql_timetracking:
        condition: service_healthy
      redis:
        condition: service_healthy
      iam_service:
        condition: service_started

  time_tracking_celery_worker:
    build:
      context: ./services/time_tracking_service
      dockerfile: Dockerfile
    command: celery -A config worker -l info
    volumes:
      - ./services/time_tracking_service:/app
    env_file:
      - .env
    environment:
      - DATABASE_NAME=${TIMETRACKING_DB_NAME:-legalflow_timetracking}
      - DATABASE_USER=${TIMETRACKING_DB_USER:-legalflow}
      - DATABASE_PASSWORD=${TIMETRACKING_DB_PASSWORD:-legalflow_secret}
      - DATABASE_HOST=mysql_timetracking
      - DATABASE_PORT=3306
      - CELERY_BROKER_URL=redis://redis:6379/0
      - IAM_SERVICE_URL=http://iam_service:8001
    depends_on:
      mysql_timetracking:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── MySQL Billing ─────────────────────────────────────────────────────────
  mysql_billing:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3311:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      - MYSQL_ROOT_PASSWORD=${BILLING_DB_ROOT_PASSWORD:-root_secret}
      - MYSQL_DATABASE=${BILLING_DB_NAME:-legalflow_billing}
      - MYSQL_USER=${BILLING_DB_USER:-legalflow}
      - MYSQL_PASSWORD=${BILLING_DB_PASSWORD:-legalflow_secret}
    volumes:
      - mysql_billing_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  billing_service:
    build:
      context: ./services/billing_service
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py makemigrations billing &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8005"
    volumes:
      - ./services/billing_service:/app
    ports:
      - "8005:8005"
    env_file:
      - .env
    environment:
      - DATABASE_NAME=${BILLING_DB_NAME:-legalflow_billing}
      - DATABASE_USER=${BILLING_DB_USER:-legalflow}
      - DATABASE_PASSWORD=${BILLING_DB_PASSWORD:-legalflow_secret}
      - DATABASE_HOST=mysql_billing
      - DATABASE_PORT=3306
      - IAM_SERVICE_URL=http://iam_service:8001/api
      - CELERY_BROKER_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=*
      - SECRET_KEY=${SECRET_KEY:-dev-insecure-secret-key-change-me}
    depends_on:
      mysql_billing:
        condition: service_healthy
      redis:
        condition: service_healthy
      iam_service:
        condition: service_started

  billing_celery_worker:
    build:
      context: ./services/billing_service
      dockerfile: Dockerfile
    command: celery -A config worker -l info
    volumes:
      - ./services/billing_service:/app
    env_file:
      - .env
    environment:
      - DATABASE_NAME=${BILLING_DB_NAME:-legalflow_billing}
      - DATABASE_USER=${BILLING_DB_USER:-legalflow}
      - DATABASE_PASSWORD=${BILLING_DB_PASSWORD:-legalflow_secret}
      - DATABASE_HOST=mysql_billing
      - DATABASE_PORT=3306
      - IAM_SERVICE_URL=http://iam_service:8001/api
      - CELERY_BROKER_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-insecure-secret-key-change-me}
    depends_on:
      mysql_billing:
        condition: service_healthy
      redis:
        condition: service_healthy

  billing_celery_beat:
    build:
      context: ./services/billing_service
      dockerfile: Dockerfile
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./services/billing_service:/app
    env_file:
      - .env
    environment:
      - DATABASE_NAME=${BILLING_DB_NAME:-legalflow_billing}
      - DATABASE_USER=${BILLING_DB_USER:-legalflow}
      - DATABASE_PASSWORD=${BILLING_DB_PASSWORD:-legalflow_secret}
      - DATABASE_HOST=mysql_billing
      - DATABASE_PORT=3306
      - IAM_SERVICE_URL=http://iam_service:8001/api
      - CELERY_BROKER_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-insecure-secret-key-change-me}
    depends_on:
      mysql_billing:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── MySQL Calendar ─────────────────────────────────────────────────────────
  mysql_calendar:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3312:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      - MYSQL_ROOT_PASSWORD=${CALENDAR_DB_ROOT_PASSWORD:-root_secret}
      - MYSQL_DATABASE=${CALENDAR_DB_NAME:-legalflow_calendar}
      - MYSQL_USER=${CALENDAR_DB_USER:-legalflow}
      - MYSQL_PASSWORD=${CALENDAR_DB_PASSWORD:-legalflow_secret}
    volumes:
      - mysql_calendar_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  calendar_service:
    build:
      context: ./services/calendar_service
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py makemigrations calendar_app &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8006"
    volumes:
      - ./services/calendar_service:/app
    ports:
      - "8006:8006"
    env_file:
      - .env
    environment:
      - DATABASE_NAME=${CALENDAR_DB_NAME:-legalflow_calendar}
      - DATABASE_USER=${CALENDAR_DB_USER:-legalflow}
      - DATABASE_PASSWORD=${CALENDAR_DB_PASSWORD:-legalflow_secret}
      - DATABASE_HOST=mysql_calendar
      - DATABASE_PORT=3306
      - IAM_SERVICE_URL=http://iam_service:8001/api
      - CELERY_BROKER_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=*
      - SECRET_KEY=${SECRET_KEY:-dev-insecure-secret-key-change-me}
    depends_on:
      mysql_calendar:
        condition: service_healthy
      redis:
        condition: service_healthy
      iam_service:
        condition: service_started

  # ─── MySQL Analytics ─────────────────────────────────────────────────────────
  mysql_analytics:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3313:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      - MYSQL_ROOT_PASSWORD=${ANALYTICS_DB_ROOT_PASSWORD:-root_secret}
      - MYSQL_DATABASE=${ANALYTICS_DB_NAME:-legalflow_analytics}
      - MYSQL_USER=${ANALYTICS_DB_USER:-legalflow}
      - MYSQL_PASSWORD=${ANALYTICS_DB_PASSWORD:-legalflow_secret}
    volumes:
      - mysql_analytics_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  analytics_service:
    build:
      context: ./services/analytics_service
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8007"
    volumes:
      - ./services/analytics_service:/app
    ports:
      - "8007:8007"
    env_file:
      - .env
    environment:
      - DATABASE_NAME=${ANALYTICS_DB_NAME:-legalflow_analytics}
      - DATABASE_USER=${ANALYTICS_DB_USER:-legalflow}
      - DATABASE_PASSWORD=${ANALYTICS_DB_PASSWORD:-legalflow_secret}
      - DATABASE_HOST=mysql_analytics
      - DATABASE_PORT=3306
      - MATTER_SERVICE_URL=http://matter_service:8003/api
      - DOCUMENT_SERVICE_URL=http://document_service:8002/api
      - TIME_SERVICE_URL=http://time_tracking_service:8004/api
      - BILLING_SERVICE_URL=http://billing_service:8005/api
      - CALENDAR_SERVICE_URL=http://calendar_service:8006/api
      - ALLOWED_HOSTS=*
      - SECRET_KEY=${SECRET_KEY:-dev-insecure-secret-key-change-me}
    depends_on:
      mysql_analytics:
        condition: service_healthy
      matter_service:
        condition: service_started
      document_service:
        condition: service_started
      time_tracking_service:
        condition: service_started
      billing_service:
        condition: service_started
      calendar_service:
        condition: service_started

  # ─── MySQL Client Portal ─────────────────────────────────────────────────────────
  mysql_portal:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3314:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      - MYSQL_ROOT_PASSWORD=${PORTAL_DB_ROOT_PASSWORD:-root_secret}
      - MYSQL_DATABASE=${PORTAL_DB_NAME:-legalflow_portal}
      - MYSQL_USER=${PORTAL_DB_USER:-legalflow}
      - MYSQL_PASSWORD=${PORTAL_DB_PASSWORD:-legalflow_secret}
    volumes:
      - mysql_portal_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  client_portal_service:
    build:
      context: ./services/client_portal_service
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8008"
    volumes:
      - ./services/client_portal_service:/app
    ports:
      - "8008:8008"
    env_file:
      - .env
    environment:
      - DATABASE_NAME=${PORTAL_DB_NAME:-legalflow_portal}
      - DATABASE_USER=${PORTAL_DB_USER:-legalflow}
      - DATABASE_PASSWORD=${PORTAL_DB_PASSWORD:-legalflow_secret}
      - DATABASE_HOST=mysql_portal
      - DATABASE_PORT=3306
      - MATTER_SERVICE_URL=http://matter_service:8003/api
      - ALLOWED_HOSTS=*
      - SECRET_KEY=${SECRET_KEY:-dev-insecure-secret-key-change-me}
    depends_on:
      mysql_portal:
        condition: service_healthy
      matter_service:
        condition: service_started

volumes:
  mysql_iam_data:
